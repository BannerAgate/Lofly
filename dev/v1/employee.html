<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lofly — Medewerker detail</title>
  <link rel="stylesheet" href="css/lofly.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    /* ── Lofly Calendar ── */
    .lf-cal-wrap { margin-bottom: 20px; }
    .lf-cal { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; }
    .lf-cal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid #e5e7eb;
    }
    .lf-cal-title { font-size: 15px; font-weight: 700; color: #1a2335; }
    .lf-cal-nav { display: flex; gap: 6px; }
    .lf-cal-btn {
      background: none; border: 1px solid #e5e7eb; border-radius: 6px;
      width: 30px; height: 30px; cursor: pointer; font-size: 14px; color: #1a2335;
      display: flex; align-items: center; justify-content: center; transition: background .15s;
    }
    .lf-cal-btn:hover { background: #f3f4f6; }
    .lf-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    .lf-cal-dow {
      text-align: center; font-size: 11px; font-weight: 600; color: #9ca3af;
      padding: 8px 4px; text-transform: uppercase; letter-spacing: .05em;
      border-bottom: 1px solid #f3f4f6;
    }
    .lf-cal-day {
      position: relative; min-height: 52px; padding: 6px 8px;
      border-right: 1px solid #f3f4f6; border-bottom: 1px solid #f3f4f6;
      cursor: default; transition: background .12s;
    }
    .lf-cal-day:nth-child(7n) { border-right: none; }
    .lf-cal-day.has-reviews { cursor: pointer; }
    .lf-cal-day.has-reviews:hover { background: #fff7ed; }
    .lf-cal-day.other-month { background: #fafafa; }
    .lf-cal-day.today .lf-cal-daynum {
      background: #1a2335; color: #fff; border-radius: 50%;
      width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
    }
    .lf-cal-daynum { font-size: 13px; color: #374151; font-weight: 500; }
    .lf-cal-day.other-month .lf-cal-daynum { color: #d1d5db; }
    .lf-cal-badge {
      position: absolute; bottom: 6px; right: 6px;
      background: #F97316; color: #fff; border-radius: 10px;
      font-size: 10px; font-weight: 700; min-width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center; padding: 0 4px;
    }
    /* Popup */
    .lf-cal-popup {
      position: fixed; z-index: 9999; background: #fff;
      border: 1px solid #e5e7eb; border-radius: 10px;
      box-shadow: 0 8px 32px rgba(26,35,53,.15);
      min-width: 260px; max-width: 320px; padding: 0;
      pointer-events: auto;
    }
    .lf-cal-popup-header {
      padding: 10px 14px; border-bottom: 1px solid #f3f4f6;
      font-size: 13px; font-weight: 700; color: #1a2335;
      display: flex; align-items: center; justify-content: space-between;
    }
    .lf-cal-popup-close {
      background: none; border: none; cursor: pointer;
      font-size: 16px; color: #9ca3af; line-height: 1; padding: 0;
    }
    .lf-cal-popup-close:hover { color: #374151; }
    .lf-cal-popup-list { max-height: 240px; overflow-y: auto; }
    .lf-cal-popup-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px; border-bottom: 1px solid #f9fafb; font-size: 12px;
    }
    .lf-cal-popup-item:last-child { border-bottom: none; }
    .lf-cal-popup-name { font-weight: 600; color: #1a2335; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lf-cal-popup-stars { color: #F97316; white-space: nowrap; font-size: 11px; }
    .lf-cal-popup-status { white-space: nowrap; }
    #lf-cal-overlay { position: fixed; inset: 0; z-index: 9998; }
  </style>
</head>
<body>

<div class="app-layout" id="appLayout" style="display:none">
  <div id="sidebarContainer"></div>

  <main class="main-content">
    <!-- Back link -->
    <a href="employees.html" style="font-size:13px;color:#6b7280;display:inline-flex;align-items:center;gap:4px;margin-bottom:20px">
      ← Terug naar medewerkers
    </a>

    <!-- Employee header -->
    <div class="card" style="margin-bottom:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div style="display:flex;align-items:center;gap:16px">
          <div style="width:56px;height:56px;border-radius:50%;background:#1a2335;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700" id="empAvatar">?</div>
          <div>
            <h1 class="page-title" id="empName">Laden...</h1>
            <p class="page-subtitle" id="empFunction"></p>
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-secondary btn-sm" onclick="downloadQR()">⬇ QR downloaden</button>
          <button class="btn btn-secondary btn-sm" onclick="copyQRUrl()">⎘ QR URL kopiëren</button>
        </div>
      </div>
    </div>

    <!-- Stats row -->
    <div class="stats-grid" style="margin-bottom:20px">
      <div class="stat-card accent">
        <div class="stat-label">QR Scans</div>
        <div class="stat-value" id="statScans">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">QR Klikken</div>
        <div class="stat-value" id="statClicks">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Conversie</div>
        <div class="stat-value" id="statConversion">—</div>
        <div class="stat-sub">klik / scan</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Gekoppelde reviews</div>
        <div class="stat-value" id="statReviews">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Gemiddeld ★</div>
        <div class="stat-value" id="statAvg">—</div>
      </div>
    </div>

    <!-- Review Calendar -->
    <div class="lf-cal-wrap" id="calendarWrap">
      <div class="lf-cal" id="reviewCalendar"></div>
    </div>

    <!-- Charts + QR -->
    <div style="display:grid;grid-template-columns:1fr 1fr 200px;gap:20px;margin-bottom:20px">
      <div class="card">
        <div class="card-header"><span class="card-title">Scans per week</span></div>
        <canvas id="chartScans" height="180"></canvas>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">Sterrenverdeling</span></div>
        <canvas id="chartStars" height="180"></canvas>
      </div>
      <div class="card" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px">
        <div class="card-title" style="text-align:center">QR Code</div>
        <div id="qrCanvas" style="width:140px;height:140px"></div>
        <div style="font-size:11px;color:#9ca3af;text-align:center" id="qrCodeId"></div>
      </div>
    </div>

    <!-- Reviews table -->
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:16px 20px;border-bottom:1px solid #e5e7eb">
        <span class="card-title">Gekoppelde reviews</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Datum</th>
              <th>Klant</th>
              <th>Portal</th>
              <th>Beoordeling</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="reviewsBody">
            <tr><td colspan="5" class="loading-overlay">Laden...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script>
let profile = null;
let emp = null;
let empScans = [];
let empReviews = [];

const params = new URLSearchParams(location.search);
const empId = params.get('id');

(async () => {
  if (!empId) { location.href = 'employees.html'; return; }
  const user = await requireAuth('index.html');
  if (!user) return;
  profile = await getCurrentProfile();
  if (!profile) { signOut(); return; }
  document.getElementById('appLayout').style.display = 'flex';
  document.getElementById('sidebarContainer').innerHTML = renderNav('employees');
  await loadEmployee();
})();

async function loadEmployee() {
  // Fetch employee and reviews in parallel; qr_scans is optional (table may not exist yet)
  const [empRes, revRes] = await Promise.all([
    getSupabase().from('employees').select('*').eq('id', empId).single(),
    getSupabase().from('reviews').select('*').eq('employee_id', empId).order('review_date', { ascending: false })
  ]);

  if (empRes.error || !empRes.data) { location.href = 'employees.html'; return; }
  emp = empRes.data;
  empReviews = revRes.data || [];

  // Try to load QR scans — table may not exist yet, so handle gracefully
  try {
    const scanRes = await getSupabase()
      .from('qr_scans')
      .select('*')
      .eq('employee_id', empId)
      .order('scanned_at', { ascending: false });
    empScans = scanRes.data || [];
  } catch (e) {
    empScans = [];
  }

  // Header
  document.title = `Lofly — ${emp.name}`;
  document.getElementById('empName').textContent = emp.name;
  document.getElementById('empFunction').textContent = emp.function_title || 'Geen functie';
  document.getElementById('empAvatar').textContent = emp.name.charAt(0).toUpperCase();

  // Stats
  const clicks = empScans.filter(s => s.button_clicked).length;
  document.getElementById('statScans').textContent = empScans.length;
  document.getElementById('statClicks').textContent = clicks;
  document.getElementById('statConversion').textContent = empScans.length
    ? Math.round((clicks / empScans.length) * 100) + '%' : '—';
  document.getElementById('statReviews').textContent = empReviews.length;
  const avg = empReviews.length
    ? (empReviews.reduce((a, r) => a + r.star_rating, 0) / empReviews.length).toFixed(1) : '—';
  document.getElementById('statAvg').textContent = avg !== '—' ? avg + ' ★' : '—';

  // QR — always use the canonical production URL so the QR works everywhere
  const qrUrl = `https://lofly-dev.pages.dev/dev/v1/redirect.html?qr=${emp.qr_code_id}`;
  document.getElementById('qrCodeId').textContent = emp.qr_code_id.substring(0, 12) + '...';
  try {
    const qrContainer = document.getElementById('qrCanvas');
    qrContainer.innerHTML = '';
    new QRCode(qrContainer, {
      text: qrUrl,
      width: 140,
      height: 140,
      colorDark: '#1a2335',
      colorLight: '#ffffff',
    });
  } catch (qrErr) {
    console.error('QR genereren mislukt:', qrErr);
    document.getElementById('qrCanvas').insertAdjacentHTML('afterend',
      `<div style="font-size:11px;color:#ef4444">QR fout: ${qrErr.message}</div>`);
  }

  // Review calendar
  renderCalendar(empReviews, 'reviewCalendar');

  // Charts and table — always render, even if data is empty
  renderScansChart();
  renderStarsChart();
  renderReviewsTable();
}

function renderScansChart() {
  const weeks = [];
  const now = new Date();
  for (let i = 7; i >= 0; i--) {
    const start = new Date(now);
    start.setDate(now.getDate() - i * 7);
    start.setHours(0,0,0,0);
    const end = new Date(start);
    end.setDate(start.getDate() + 7);
    weeks.push({ label: `W${start.getDate()}/${start.getMonth()+1}`, start, end });
  }
  const counts = weeks.map(w =>
    empScans.filter(s => {
      const d = new Date(s.scanned_at);
      return d >= w.start && d < w.end;
    }).length
  );

  new Chart(document.getElementById('chartScans').getContext('2d'), {
    type: 'line',
    data: {
      labels: weeks.map(w => w.label),
      datasets: [{
        label: 'Scans',
        data: counts,
        borderColor: '#F97316',
        backgroundColor: 'rgba(249,115,22,.1)',
        tension: .35,
        fill: true,
        pointBackgroundColor: '#F97316',
        pointRadius: 3,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
    }
  });
}

function renderStarsChart() {
  const counts = [1,2,3,4,5].map(s => empReviews.filter(r => r.star_rating === s).length);
  new Chart(document.getElementById('chartStars').getContext('2d'), {
    type: 'bar',
    data: {
      labels: ['1★','2★','3★','4★','5★'],
      datasets: [{
        data: counts,
        backgroundColor: ['#fee2e2','#fecaca','#fde68a','#bbf7d0','#6ee7b7'],
        borderWidth: 0,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { precision: 0 } } }
    }
  });
}

function renderReviewsTable() {
  const tbody = document.getElementById('reviewsBody');
  if (!empReviews.length) {
    tbody.innerHTML = `
      <tr><td colspan="5">
        <div class="empty-state">
          <div class="empty-state-icon">📭</div>
          <div class="empty-state-title">Geen reviews gekoppeld</div>
          <div class="empty-state-sub">Reviews worden hier getoond wanneer ze aan deze medewerker worden gekoppeld.</div>
        </div>
      </td></tr>`;
    return;
  }
  tbody.innerHTML = empReviews.map(r => `
    <tr>
      <td style="color:#6b7280;white-space:nowrap">${formatDate(r.review_date)}</td>
      <td class="font-semibold">${escHtml(r.reviewer_name || 'Anoniem')}</td>
      <td>${getSourceBadge(r.source)}</td>
      <td>${renderStars(r.star_rating)}</td>
      <td>${getStatusBadge(r.status)}</td>
    </tr>
  `).join('');
}

function copyQRUrl() {
  const url = `https://lofly-dev.pages.dev/dev/v1/redirect.html?qr=${emp.qr_code_id}`;
  navigator.clipboard.writeText(url);
  showToast('QR URL gekopieerd!');
}

function downloadQR() {
  const container = document.getElementById('qrCanvas');
  const canvas = container.querySelector('canvas');
  if (!canvas) { showToast('QR code niet beschikbaar', 'error'); return; }
  const link = document.createElement('a');
  link.download = `qr-${emp.name.replace(/\s+/g,'-').toLowerCase()}.png`;
  link.href = canvas.toDataURL();
  link.click();
}

function escHtml(str) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

/* ── Review Calendar ── */
(function() {
  let _calYear, _calMonth, _calReviews, _calContainerId;

  window.renderCalendar = function(reviewsArray, containerId) {
    _calReviews = reviewsArray || [];
    _calContainerId = containerId;
    const now = new Date();
    _calYear = now.getFullYear();
    _calMonth = now.getMonth();
    _drawCalendar();
  };

  function _drawCalendar() {
    const container = document.getElementById(_calContainerId);
    if (!container) return;

    const monthNames = ['Januari','Februari','Maart','April','Mei','Juni',
      'Juli','Augustus','September','Oktober','November','December'];
    const dowLabels = ['Ma','Di','Wo','Do','Vr','Za','Zo'];

    // Build day-index map: "YYYY-MM-DD" -> [reviews]
    const dayMap = {};
    _calReviews.forEach(r => {
      if (!r.review_date) return;
      const key = r.review_date.substring(0, 10);
      if (!dayMap[key]) dayMap[key] = [];
      dayMap[key].push(r);
    });

    // First day of month (shifted so Monday=0)
    const firstDay = new Date(_calYear, _calMonth, 1);
    let startDow = firstDay.getDay(); // 0=Sun
    startDow = (startDow + 6) % 7;    // Monday=0

    const daysInMonth = new Date(_calYear, _calMonth + 1, 0).getDate();
    const daysInPrev  = new Date(_calYear, _calMonth, 0).getDate();
    const today = new Date();
    const todayKey = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

    // Build cells
    let cells = '';

    // Day-of-week headers
    dowLabels.forEach(d => {
      cells += `<div class="lf-cal-dow">${d}</div>`;
    });

    // Prev month trailing days
    for (let i = startDow - 1; i >= 0; i--) {
      const day = daysInPrev - i;
      const m = _calMonth === 0 ? 12 : _calMonth;
      const y = _calMonth === 0 ? _calYear - 1 : _calYear;
      const key = `${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      cells += _dayCell(day, key, true, key === todayKey, dayMap[key]);
    }

    // Current month days
    for (let day = 1; day <= daysInMonth; day++) {
      const key = `${_calYear}-${String(_calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      cells += _dayCell(day, key, false, key === todayKey, dayMap[key]);
    }

    // Next month leading days
    const totalCells = startDow + daysInMonth;
    const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for (let day = 1; day <= remaining; day++) {
      const m = _calMonth === 11 ? 1 : _calMonth + 2;
      const y = _calMonth === 11 ? _calYear + 1 : _calYear;
      const key = `${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      cells += _dayCell(day, key, true, key === todayKey, dayMap[key]);
    }

    container.innerHTML = `
      <div class="lf-cal-header">
        <span class="lf-cal-title">${monthNames[_calMonth]} ${_calYear}</span>
        <div class="lf-cal-nav">
          <button class="lf-cal-btn" onclick="_calNav(-1)">&#8249;</button>
          <button class="lf-cal-btn" onclick="_calNav(1)">&#8250;</button>
        </div>
      </div>
      <div class="lf-cal-grid">${cells}</div>
    `;
  }

  function _dayCell(day, key, otherMonth, isToday, reviews) {
    const hasR = reviews && reviews.length > 0;
    const cls = [
      'lf-cal-day',
      otherMonth ? 'other-month' : '',
      isToday ? 'today' : '',
      hasR ? 'has-reviews' : ''
    ].filter(Boolean).join(' ');

    const badge = hasR
      ? `<span class="lf-cal-badge">${reviews.length}</span>`
      : '';
    const clickAttr = hasR
      ? `onclick="_calShowPopup(event,'${key}')"`
      : '';

    return `<div class="${cls}" ${clickAttr}>
      <span class="lf-cal-daynum">${day}</span>
      ${badge}
    </div>`;
  }

  window._calNav = function(dir) {
    _calMonth += dir;
    if (_calMonth > 11) { _calMonth = 0; _calYear++; }
    if (_calMonth < 0)  { _calMonth = 11; _calYear--; }
    _calShowPopupClose();
    _drawCalendar();
  };

  window._calShowPopup = function(event, dateKey) {
    _calShowPopupClose();

    const dayMap = {};
    _calReviews.forEach(r => {
      if (!r.review_date) return;
      const k = r.review_date.substring(0, 10);
      if (!dayMap[k]) dayMap[k] = [];
      dayMap[k].push(r);
    });

    const reviews = dayMap[dateKey] || [];
    if (!reviews.length) return;

    const [y, m, d] = dateKey.split('-');
    const label = `${parseInt(d)} ${['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'][parseInt(m)-1]} ${y}`;

    const statusLabel = { pending: 'Te behandelen', posted: 'Geplaatst', ignored: 'Genegeerd' };
    const items = reviews.map(r => `
      <div class="lf-cal-popup-item">
        <span class="lf-cal-popup-name">${_escHtmlCal(r.reviewer_name || 'Anoniem')}</span>
        <span class="lf-cal-popup-stars">${'★'.repeat(r.star_rating || 0)}${'☆'.repeat(5-(r.star_rating||0))}</span>
        <span class="lf-cal-popup-status">${typeof getStatusBadge === 'function' ? getStatusBadge(r.status) : (statusLabel[r.status] || r.status)}</span>
      </div>
    `).join('');

    const popup = document.createElement('div');
    popup.className = 'lf-cal-popup';
    popup.id = 'lf-cal-popup';
    popup.innerHTML = `
      <div class="lf-cal-popup-header">
        <span>${label} — ${reviews.length} review${reviews.length > 1 ? 's' : ''}</span>
        <button class="lf-cal-popup-close" onclick="_calShowPopupClose()">×</button>
      </div>
      <div class="lf-cal-popup-list">${items}</div>
    `;
    document.body.appendChild(popup);

    // Overlay to close on outside click
    const overlay = document.createElement('div');
    overlay.id = 'lf-cal-overlay';
    overlay.onclick = _calShowPopupClose;
    document.body.appendChild(overlay);

    // Position popup near click
    const rect = event.currentTarget.getBoundingClientRect();
    const scrollY = window.scrollY;
    let top = rect.bottom + scrollY + 4;
    let left = rect.left + window.scrollX;

    // Prevent going off right edge
    const popupW = 300;
    if (left + popupW > window.innerWidth - 12) {
      left = window.innerWidth - popupW - 12;
    }

    popup.style.top = top + 'px';
    popup.style.left = left + 'px';
  };

  window._calShowPopupClose = function() {
    const p = document.getElementById('lf-cal-popup');
    if (p) p.remove();
    const o = document.getElementById('lf-cal-overlay');
    if (o) o.remove();
  };

  function _escHtmlCal(str) {
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(str));
    return d.innerHTML;
  }
})();
</script>
</body>
</html>
