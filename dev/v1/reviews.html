<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lofly — Reviews</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/lofly.css">
  <style>
    .date-filter-label { font-size:12px;font-weight:600;color:#6b7280;display:block;margin-bottom:3px; }
  </style>
</head>
<body>

<div class="app-layout" id="appLayout" style="display:none">
  <!-- Sidebar injected by JS -->
  <div id="sidebarContainer"></div>

  <main class="main-content">
    <div class="page-header">
      <div>
        <h1 class="page-title">Reviews</h1>
        <p class="page-subtitle" id="orgName">Laden...</p>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <button class="btn btn-secondary btn-sm" onclick="fetchReviews()">↻ Vernieuwen</button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs" id="reviewTabs">
      <button class="tab-btn active" data-status="pending" onclick="setTab(this,'pending')">
        Te behandelen <span class="tab-count" id="count-pending">0</span>
      </button>
      <button class="tab-btn" data-status="approved" onclick="setTab(this,'approved')">
        Goedgekeurd <span class="tab-count" id="count-approved">0</span>
      </button>
      <button class="tab-btn" data-status="rejected" onclick="setTab(this,'rejected')">
        Afgewezen <span class="tab-count" id="count-rejected">0</span>
      </button>
      <button class="tab-btn" data-status="posted" onclick="setTab(this,'posted')">
        Geplaatst <span class="tab-count" id="count-posted">0</span>
      </button>
      <button class="tab-btn" data-status="" onclick="setTab(this,'')">
        Alle <span class="tab-count" id="count-all">0</span>
      </button>
    </div>

    <!-- Filters row -->
    <div style="display:flex;gap:10px;margin-bottom:16px;align-items:flex-end;flex-wrap:wrap">
      <div>
        <label class="date-filter-label" for="dateFrom">Van</label>
        <input type="date" class="form-control" id="dateFrom" style="width:150px" onchange="applyFilters()">
      </div>
      <div>
        <label class="date-filter-label" for="dateTo">Tot</label>
        <input type="date" class="form-control" id="dateTo" style="width:150px" onchange="applyFilters()">
      </div>
      <select class="form-control" id="filterSource" style="width:160px" onchange="applyFilters()">
        <option value="">Alle portals</option>
        <option value="google">Google</option>
        <option value="klantenvertellen">Klantenvertellen</option>
      </select>
      <select class="form-control" id="filterRating" style="width:140px" onchange="applyFilters()">
        <option value="">Alle sterren</option>
        <option value="5">5 sterren</option>
        <option value="4">4 sterren</option>
        <option value="3">3 sterren</option>
        <option value="2">2 sterren</option>
        <option value="1">1 ster</option>
      </select>
      <select class="form-control" id="filterEmployee" style="width:180px" onchange="applyFilters()">
        <option value="">Alle medewerkers</option>
      </select>
      <input class="form-control" type="text" id="filterSearch" placeholder="Zoek op naam of tekst..." style="flex:1;min-width:200px" oninput="applyFilters()">
    </div>

    <!-- Reviews table -->
    <div class="card" style="padding:0;overflow:hidden">
      <div class="table-wrap">
        <table id="reviewsTable">
          <thead>
            <tr>
              <th>Datum</th>
              <th>Klant</th>
              <th>Portal</th>
              <th>Beoordeling</th>
              <th>Status</th>
              <th>Medewerker</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="reviewsBody">
            <tr><td colspan="7" class="loading-overlay">Laden...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Review Edit Modal -->
<div class="modal-backdrop hidden" id="reviewModal">
  <div class="modal" style="max-width:900px">
    <div class="modal-header">
      <div>
        <h2 class="modal-title" id="modalReviewerName">Review</h2>
        <div id="modalMeta" style="font-size:12px;color:#6b7280;margin-top:3px"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div style="margin-bottom:16px">
      <div class="review-section-label" style="display:flex;justify-content:space-between;align-items:center">
        Review tekst
        <button onclick="openOorkonde()" style="font-size:11px;font-weight:500;color:#F97316;background:#fff3e8;border:0.5px solid #F97316;border-radius:4px;padding:2px 8px;cursor:pointer;display:flex;align-items:center;gap:4px">&#9733; Uitvouwen</button>
      </div>
      <div class="review-text-box" id="modalReviewText">—</div>
    </div>

    <div style="margin-bottom:16px">
      <div class="review-section-label">Lofly-assistent suggestie</div>
      <div class="review-text-box" id="modalAIResponse" style="color:#4b5563">—</div>
    </div>

    <div class="form-group">
      <label class="form-label">Definitieve reactie</label>
      <textarea class="form-control" id="modalFinalResponse" rows="7" placeholder="Bewerk de AI-suggestie of schrijf een eigen reactie..."></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Koppel aan medewerker</label>
      <select class="form-control" id="modalEmployee" onchange="syncSecondEmployeeOptions()">
        <option value="">Geen medewerker</option>
      </select>
    </div>

    <div id="secondEmployeeWrapper" style="display:none;margin-top:8px;display:none">
      <div style="display:flex;align-items:center;gap:8px">
        <select class="form-control" id="modalEmployee2" style="flex:1">
          <option value="">Geen medewerker</option>
        </select>
        <button type="button" onclick="removeSecondEmployee()" style="background:none;border:none;cursor:pointer;color:#6b7280;font-size:18px;padding:4px 6px;line-height:1" title="Verwijder extra medewerker">×</button>
      </div>
    </div>

    <div id="addSecondEmployeeLink" style="margin-top:8px">
      <button type="button" onclick="addSecondEmployee()" style="background:none;border:none;cursor:pointer;color:#F97316;font-size:13px;padding:0;text-decoration:underline">Koppel aan extra medewerker +</button>
    </div>

    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" onclick="updateReviewStatus('rejected')">Afwijzen</button>
      <button class="btn btn-secondary" onclick="closeModal()">Annuleren</button>
      <button class="btn btn-secondary" onclick="updateReviewStatus('approved')">Goedkeuren</button>
      <button class="btn btn-primary" onclick="postReview()">
        <span id="postBtnText">Plaatsen</span>
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script>
let profile = null;
let allReviews = [];
let currentStatus = 'pending';
let currentReviewId = null;
let currentEmployeeId = null;
let currentSecondEmployeeId = null;
let employees = [];

// ============================================================
// Init
// ============================================================
(async () => {
  console.log('[lofly] reviews IIFE: start');

  const user = await requireAuth('/');
  console.log('[lofly] reviews IIFE: user =', user?.email ?? 'null');
  if (!user) return;

  console.log('[lofly] reviews IIFE: profiel ophalen...');
  profile = await getCurrentProfile();
  console.log('[lofly] reviews IIFE: profiel =', profile?.organizations?.name ?? 'null');
  if (!profile) {
    console.error('Profile laden mislukt — sessie vernieuwen');
    document.body.innerHTML = '<div style="padding:40px;color:#fff;background:#1a2335;min-height:100vh;font-family:sans-serif"><h2>Sessie probleem</h2><p>Profiel kon niet worden geladen. <a href="index.html" style="color:#F97316">Opnieuw inloggen</a></p></div>';
    return;
  }

  console.log('[lofly] reviews IIFE: layout tonen...');
  document.getElementById('orgName').textContent = profile.organizations?.name || '';
  document.getElementById('appLayout').style.display = 'flex';
  document.getElementById('sidebarContainer').innerHTML = renderNav('reviews');

  // Readonly: verberg actieknoppen in modal
  if (!isReviewer(profile)) {
    ['modalFinalResponse','modalEmployee'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.disabled = true;
    });
    document.querySelectorAll('[onclick*="updateReviewStatus"], [onclick*="postReview"]').forEach(el => el.style.display = 'none');
  }

  await Promise.all([loadEmployees(), fetchReviews()]);
  console.log('[lofly] reviews IIFE: klaar');
})();

// ============================================================
// Load employees (for filter + modal)
// ============================================================
async function loadEmployees() {
  const { data } = await getSupabase()
    .from('employees')
    .select('id, name')
    .order('name');

  employees = data || [];

  // Populate filter dropdown
  const filterSel = document.getElementById('filterEmployee');
  employees.forEach(e => {
    filterSel.innerHTML += `<option value="${e.id}">${e.name}</option>`;
  });

  // Populate modal dropdown
  const modalSel = document.getElementById('modalEmployee');
  employees.forEach(e => {
    modalSel.innerHTML += `<option value="${e.id}">${e.name}</option>`;
  });
}

// ============================================================
// Fetch reviews
// ============================================================
async function fetchReviews() {
  const tbody = document.getElementById('reviewsBody');
  tbody.innerHTML = '<tr><td colspan="7" class="loading-overlay">Laden...</td></tr>';

  const { data, error } = await getSupabase()
    .from('reviews')
    .select('*, employees!employee_id(name), second_employee:employees!second_employee_id(name)')
    .order('review_date', { ascending: false });

  if (error) {
    tbody.innerHTML = `<tr><td colspan="7" style="padding:24px;color:#dc2626">Fout bij laden: ${error.message}</td></tr>`;
    return;
  }

  allReviews = data || [];
  updateCounts();
  applyFilters();
}

// ============================================================
// Update tab counts (based on active filters, excluding status)
// ============================================================
function updateCounts(baseFiltered) {
  const set = baseFiltered || allReviews;
  document.getElementById('count-all').textContent = set.length;
  ['pending','approved','posted','rejected'].forEach(s => {
    document.getElementById(`count-${s}`).textContent =
      set.filter(r => r.status === s).length;
  });
}

// ============================================================
// Tab switching
// ============================================================
function setTab(btn, status) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentStatus = status;
  applyFilters();
}

// ============================================================
// Apply filters
// ============================================================
function applyFilters() {
  const source = document.getElementById('filterSource').value;
  const rating = document.getElementById('filterRating').value;
  const employeeId = document.getElementById('filterEmployee').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();
  const dateFrom = document.getElementById('dateFrom').value;
  const dateTo = document.getElementById('dateTo').value;

  // Base set: all non-status filters applied (used for tab counts)
  const base = allReviews.filter(r => {
    if (source && r.source !== source) return false;
    if (rating && Math.round(parseFloat(r.star_rating)) !== parseInt(rating)) return false;
    if (employeeId && r.employee_id !== employeeId) return false;
    if (dateFrom && r.review_date && r.review_date.slice(0,10) < dateFrom) return false;
    if (dateTo && r.review_date && r.review_date.slice(0,10) > dateTo) return false;
    if (search) {
      const haystack = `${r.reviewer_name || ''} ${r.review_text || ''}`.toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  updateCounts(base);

  // Filtered set: also apply status
  const filtered = currentStatus ? base.filter(r => r.status === currentStatus) : base;
  renderTable(filtered);
}

// ============================================================
// Render table
// ============================================================
function renderTable(reviews) {
  const tbody = document.getElementById('reviewsBody');

  if (!reviews.length) {
    tbody.innerHTML = `
      <tr><td colspan="7">
        <div class="empty-state">
          <div class="empty-state-icon">📭</div>
          <div class="empty-state-title">Geen reviews gevonden</div>
          <div class="empty-state-sub">Pas de filters aan of wacht op nieuwe reviews.</div>
        </div>
      </td></tr>`;
    return;
  }

  tbody.innerHTML = reviews.map(r => `
    <tr>
      <td style="color:#6b7280;white-space:nowrap">${formatDate(r.review_date)}</td>
      <td>
        <div class="font-semibold">${escHtml(r.reviewer_name || 'Anoniem')}</div>
        ${r.review_text ? `<div class="text-muted truncate" style="font-size:12px">${escHtml(r.review_text.substring(0,60))}${r.review_text.length>60?'…':''}</div>` : ''}
      </td>
      <td>${getSourceBadge(r.source)}</td>
      <td>${renderStars(r.star_rating)}</td>
      <td>${getStatusBadge(r.status)}</td>
      <td style="color:#6b7280">${r.employees?.name ? (r.second_employee?.name ? `${r.employees.name}<br><span style="font-size:11px">${r.second_employee.name}</span>` : r.employees.name) : '—'}</td>
      <td>
        <button class="btn btn-secondary btn-sm" onclick="openModal('${r.id}')">Behandelen</button>
      </td>
    </tr>
  `).join('');
}

// ============================================================
// Modal
// ============================================================
function openModal(reviewId) {
  const r = allReviews.find(x => x.id === reviewId);
  if (!r) return;
  currentReviewId = reviewId;

  document.getElementById('modalReviewerName').textContent = r.reviewer_name || 'Anonieme reviewer';
  document.getElementById('modalMeta').innerHTML =
    `${getSourceBadge(r.source)} ${renderStars(r.star_rating)} <span style="margin-left:8px">${formatDate(r.review_date)}</span>`;
  document.getElementById('modalReviewText').textContent = r.review_text || '(Geen tekst)';
  document.getElementById('modalAIResponse').textContent = r.ai_response || '(Nog geen AI-suggestie gegenereerd)';
  document.getElementById('modalFinalResponse').value = r.final_response || r.ai_response || '';
  currentEmployeeId = r.employee_id || null;
  currentSecondEmployeeId = r.second_employee_id || null;
  document.getElementById('modalEmployee').value = r.employee_id || '';
  syncSecondEmployeeOptions();
  if (r.second_employee_id) {
    showSecondEmployeeDropdown();
    document.getElementById('modalEmployee2').value = r.second_employee_id;
  } else {
    hideSecondEmployeeDropdown();
  }
  document.getElementById('postBtnText').textContent = r.status === 'posted' ? 'Herplaatsen' : 'Plaatsen';

  document.getElementById('reviewModal').classList.remove('hidden');
}

async function closeModal() {
  const selectedEmployee = document.getElementById('modalEmployee').value || null;
  const secondWrapper = document.getElementById('secondEmployeeWrapper');
  const selectedSecond = (secondWrapper.style.display !== 'none' ? document.getElementById('modalEmployee2').value : '') || null;
  if (currentReviewId && (selectedEmployee !== currentEmployeeId || selectedSecond !== currentSecondEmployeeId)) {
    await getSupabase()
      .from('reviews')
      .update({ employee_id: selectedEmployee, second_employee_id: selectedSecond, updated_at: new Date().toISOString() })
      .eq('id', currentReviewId);
    const r = allReviews.find(x => x.id === currentReviewId);
    if (r) { r.employee_id = selectedEmployee; r.second_employee_id = selectedSecond; }
  }
  document.getElementById('reviewModal').classList.add('hidden');
  currentReviewId = null;
  currentEmployeeId = null;
  currentSecondEmployeeId = null;
}

function addSecondEmployee() {
  showSecondEmployeeDropdown();
}

function showSecondEmployeeDropdown() {
  const wrapper = document.getElementById('secondEmployeeWrapper');
  wrapper.style.display = 'block';
  document.getElementById('addSecondEmployeeLink').style.display = 'none';
  syncSecondEmployeeOptions();
}

function hideSecondEmployeeDropdown() {
  const wrapper = document.getElementById('secondEmployeeWrapper');
  wrapper.style.display = 'none';
  document.getElementById('addSecondEmployeeLink').style.display = 'block';
  document.getElementById('modalEmployee2').value = '';
}

function removeSecondEmployee() {
  hideSecondEmployeeDropdown();
}

function syncSecondEmployeeOptions() {
  const firstVal = document.getElementById('modalEmployee').value;
  const sel2 = document.getElementById('modalEmployee2');
  const currentVal2 = sel2.value;
  sel2.innerHTML = '<option value="">Geen medewerker</option>';
  employees.forEach(e => {
    if (e.id !== firstVal) {
      sel2.innerHTML += `<option value="${e.id}">${e.name}</option>`;
    }
  });
  if (currentVal2 && currentVal2 !== firstVal) sel2.value = currentVal
